<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Road Damage System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-amber-400 to-orange-500"></div>

        <div class="text-center mb-8">
            <div class="inline-block bg-amber-500 text-slate-950 p-3 rounded-xl shadow-lg shadow-amber-500/20 mb-4">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-100 tracking-wide">SECURE ACCESS</h1>
            <p class="text-xs text-slate-400 mt-1">Sistem Manajemen & Pemetaan Jalan</p>
        </div>

        {% if error %}
        <div class="bg-rose-500/10 border border-rose-500/50 text-rose-400 text-sm p-3 rounded-lg mb-6 text-center">
            <i class="fa-solid fa-triangle-exclamation mr-1"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="flex flex-col gap-5">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Username</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" name="username" required autocomplete="off"
                        class="w-full bg-slate-950 border border-slate-700 text-slate-200 text-sm rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="password" name="password" required 
                        class="w-full bg-slate-950 border border-slate-700 text-slate-200 text-sm rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
                </div>
            </div>

            <button type="submit" class="mt-4 w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold py-3 rounded-lg shadow-lg shadow-amber-500/20 transition-all flex justify-center items-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> Masuk Sistem
            </button>
        </form>
        
        <p class="text-center text-slate-500 text-[10px] mt-8">
            Hanya personil berwenang yang memiliki akses ke sistem ini.
        </p>
    </div>

</body>
</html>
